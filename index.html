<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRF Test</title>
<style>
body{background:#000;color:#c8a050;font-family:monospace;padding:20px;}
button{background:#c8a050;color:#000;border:none;padding:12px 24px;font-size:16px;font-weight:900;border-radius:8px;margin:8px 4px;display:block;width:100%;}
#log{margin-top:20px;font-size:13px;line-height:2;}
</style>
</head>
<body>
<h2>◈ WebAuthn PRF Test</h2>
<button onclick="register()">1. Register Face ID</button>
<button onclick="deriveKey()">2. Derive Key from Face ID</button>
<button onclick="testEncrypt()">3. Test Encrypt/Decrypt</button>
<button onclick="clearCred()">✕ Clear Registration</button>
<div id="log"></div>

<script>
const CRED_KEY='nq_prf_cred_id';
const PRF_SALT=new TextEncoder().encode('NakedQuantum_v1_salt');
let currentKey=null;

function log(msg){
  document.getElementById('log').innerHTML+=`<div>${msg}</div>`;
}

function bufToB64(buf){
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}
function b64ToBuf(b64){
  return Uint8Array.from(atob(b64),c=>c.charCodeAt(0)).buffer;
}

async function register(){
  try{
    log('⚡ Registering with Face ID + prf...');
    
    const cred=await navigator.credentials.create({
      publicKey:{
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        rp:{name:'NakedQuantum',id:location.hostname},
        user:{
          id: crypto.getRandomValues(new Uint8Array(16)),
          name:'kaja',
          displayName:'Kaja'
        },
        pubKeyCredParams:[{alg:-7,type:'public-key'}],
        authenticatorSelection:{
          authenticatorAttachment:'platform',
          userVerification:'required',
          residentKey:'required'
        },
        extensions:{
          prf:{
            eval:{
              first: PRF_SALT
            }
          }
        },
        timeout:60000
      }
    });

    // Check if prf was supported
    const ext=cred.getClientExtensionResults();
    log('Extension results: '+JSON.stringify(Object.keys(ext)));
    
    if(ext.prf){
      log('✓ PRF extension supported!');
      if(ext.prf.enabled){
        log('✓ PRF enabled on this credential');
      }
    } else {
      log('⚠ PRF not in results — may still work on get()');
    }

    localStorage.setItem(CRED_KEY, bufToB64(cred.rawId));
    log('✓ Credential registered: '+bufToB64(cred.rawId).slice(0,20)+'...');
    log('→ Now tap "Derive Key from Face ID"');

  }catch(err){
    log('✕ Register failed: '+err.message);
  }
}

async function deriveKey(){
  const credId=localStorage.getItem(CRED_KEY);
  if(!credId){log('✕ Register first');return;}

  try{
    log('⚡ Authenticating + deriving key via prf...');

    const assertion=await navigator.credentials.get({
      publicKey:{
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        allowCredentials:[{
          id: b64ToBuf(credId),
          type:'public-key'
        }],
        userVerification:'required',
        extensions:{
          prf:{
            eval:{
              first: PRF_SALT
            }
          }
        },
        timeout:60000
      }
    });

    const ext=assertion.getClientExtensionResults();
    log('Extension results: '+JSON.stringify(Object.keys(ext)));

    if(!ext.prf||!ext.prf.results||!ext.prf.results.first){
      log('✕ PRF output not available — device may not support prf');
      log('Detail: '+JSON.stringify(ext));
      return;
    }

    // Use prf output as raw key material
    const prfOutput=ext.prf.results.first;
    log('✓ PRF output received: '+bufToB64(prfOutput).slice(0,20)+'...');

    // Import as AES-GCM key
    currentKey=await crypto.subtle.importKey(
      'raw',
      prfOutput,
      {name:'AES-GCM',length:256},
      false,
      ['encrypt','decrypt']
    );

    log('✓ AES-256-GCM key derived from Face ID!');
    log('✓ Key lives in memory only — never stored');
    log('→ Now tap "Test Encrypt/Decrypt"');

  }catch(err){
    log('✕ Derive failed: '+err.message);
  }
}

async function testEncrypt(){
  if(!currentKey){log('✕ Derive key first');return;}

  try{
    log('⚡ Testing encryption...');

    const plaintext='This discourse belongs to the abyss. ◈';
    const enc=new TextEncoder();
    const iv=crypto.getRandomValues(new Uint8Array(12));

    const ciphertext=await crypto.subtle.encrypt(
      {name:'AES-GCM',iv},
      currentKey,
      enc.encode(plaintext)
    );

    log('✓ Encrypted: '+bufToB64(ciphertext).slice(0,30)+'...');

    // Now decrypt
    const decrypted=await crypto.subtle.decrypt(
      {name:'AES-GCM',iv},
      currentKey,
      ciphertext
    );

    const result=new TextDecoder().decode(decrypted);
    log('✓ Decrypted: '+result);
    log(result===plaintext?'🔥 PERFECT MATCH — prf + AES-GCM works!':'✕ Mismatch — something wrong');

  }catch(err){
    log('✕ Encrypt test failed: '+err.message);
  }
}

function clearCred(){
  localStorage.removeItem(CRED_KEY);
  currentKey=null;
  log('◌ Cleared — register again');
}
</script>
</body>
</html>
