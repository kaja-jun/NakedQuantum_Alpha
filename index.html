<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQLite Test</title>
<style>
body { background: #000; color: #c8a050; font-family: monospace; padding: 20px; }
#log { margin-top: 20px; font-size: 14px; line-height: 2; }
button { background: #c8a050; color: #000; border: none; padding: 12px 24px; font-size: 16px; font-weight: 900; border-radius: 8px; margin: 8px; }
</style>
</head>
<body>
<h2>◈ SQLite OPFS Test</h2>
<button onclick="runTest()">Run Test</button>
<button onclick="reloadAndRead()">Reload & Read</button>
<div id="log"></div>

<script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
<script>
function log(msg){
  document.getElementById('log').innerHTML+=`<div>${msg}</div>`;
}

let SQL = null;
let db = null;
const DB_FILE = 'nq.db';

async function getOPFSFile(create=false){
  const root = await navigator.storage.getDirectory();
  return await root.getFileHandle(DB_FILE, {create});
}

async function loadDBFromOPFS(){
  try {
    const fh = await getOPFSFile(false);
    const file = await fh.getFile();
    const buf = await file.arrayBuffer();
    return new Uint8Array(buf);
  } catch(e) {
    return null; // file doesn't exist yet
  }
}

async function saveDBToOPFS(data){
  const fh = await getOPFSFile(true);
  const writable = await fh.createWritable();
  await writable.write(data);
  await writable.close();
}

async function initSQL(){
  log('⚡ Loading sql.js...');
  SQL = await initSqlJs({
    locateFile: file => `https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/${file}`
  });
  log('✓ sql.js loaded');

  const existing = await loadDBFromOPFS();
  if(existing){
    db = new SQL.Database(existing);
    log('✓ Loaded existing nq.db from OPFS');
  } else {
    db = new SQL.Database();
    log('✓ Created new nq.db');
  }
  return db;
}

async function runTest(){
  try {
    if(!db) await initSQL();

    log('⚡ Creating table...');
    db.run('CREATE TABLE IF NOT EXISTS discourses (id TEXT PRIMARY KEY, title TEXT, body TEXT, created_at INTEGER)');
    log('✓ Table created');

    const id = 'd_' + Date.now();
    const title = 'First NQ Discourse ◈';
    const body = 'The abyss stares back.';
    db.run('INSERT OR REPLACE INTO discourses VALUES (?,?,?,?)', [id, title, body, Date.now()]);
    log('✓ Inserted: ' + title);

    const rows = db.exec('SELECT * FROM discourses ORDER BY created_at DESC LIMIT 5');
    if(rows.length){
      rows[0].values.forEach(r => log('  → ' + r[1]));
    }

    // Save to OPFS
    const data = db.export();
    await saveDBToOPFS(data);
    log('✓ Saved to OPFS');

    log('🔥 SQLite + OPFS works! NQ data layer ready.');
  } catch(err) {
    log('✕ Error: ' + err.message);
    console.error(err);
  }
}

async function reloadAndRead(){
  try {
    db = null;
    await initSQL();
    const rows = db.exec('SELECT * FROM discourses ORDER BY created_at DESC');
    if(rows.length){
      log('✓ Persisted rows found: ' + rows[0].values.length);
      rows[0].values.forEach(r => log('  → ' + r[1]));
    } else {
      log('◌ No rows found');
    }
  } catch(err) {
    log('✕ ' + err.message);
  }
}
</script>
</body>
</html>
